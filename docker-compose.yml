services:
  db:
    image: postgres:16-alpine
    container_name: coffeeshop-db
    environment:
      POSTGRES_DB: coffeeshop_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coffeeshop_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: coffeeshop-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/coffeeshop_inventory
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_SCHEMA: coffeeshopims
      JWT_SECRET: ${JWT_SECRET:-coffeeshop-ims-secret-key-must-be-at-least-256-bits-long!!}

volumes:
  pgdata:
